version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: shelterlink-db
    environment:
      POSTGRES_USER: shelterlink
      POSTGRES_PASSWORD: shelterlink_dev_password
      POSTGRES_DB: shelterlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelterlink"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: shelterlink-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://shelterlink:shelterlink_dev_password@db:5432/shelterlink
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
